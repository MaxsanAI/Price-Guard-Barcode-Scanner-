name: Android CI / APK Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: DEBUG - List everything
        run: ls -R  # Ovo će ispisati apsolutno sve fajlove na serveru

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PriceGuard-Debug-APK
          path: .  # Uploadovaće ceo folder da budemo sigurni