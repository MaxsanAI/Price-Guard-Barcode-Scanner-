name: Android CI / APK Builder

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Debug APK
        # Koristimo :app:assembleDebug da budemo sigurni da gradi pravu aplikaciju
        run: ./gradlew :app:assembleDebug

      - name: Upload Compiled APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PriceGuard-Debug-APK
          # Ovde sada direktno gađamo folder gde app modul čuva svoj APK
          path: app/build/outputs/apk/debug/app-debug.apk