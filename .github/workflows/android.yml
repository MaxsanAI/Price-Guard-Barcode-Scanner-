name: Android CI / APK Builder

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        # Ako je build folder u root-u, gradlew će ga tamo i napraviti
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PriceGuard-Debug-APK
          # Ovde menjamo putanju jer je build direktno u root-u
          path: build/outputs/apk/debug/*.apk
          if-no-files-found: error